<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sociálne siete · Café Luna</title>
  <meta name="theme-color" content="#5d7a3a" />
  <link rel="icon" type="image/svg+xml" href="../../studio/favicon.svg?v=3" />
  <link rel="stylesheet" href="css/theme.css?v=3" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    body { background: var(--bg); }
    .wrap { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 120px 24px 80px; background: linear-gradient(180deg, var(--bg-3) 0%, var(--bg-2) 100%); }
    .tag { display: inline-flex; align-items: center; gap: 10px; padding: 8px 18px 8px 12px; background: var(--accent-soft); color: var(--accent-deep); border-radius: 999px; font-size: 0.86rem; font-weight: 600; margin-bottom: 26px; }
    .tag .pulse { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); position: relative; }
    .tag .pulse::after { content: ""; position: absolute; inset: -4px; border-radius: 50%; border: 2px solid var(--accent); opacity: 0.5; animation: ping 1.6s ease-out infinite; }
    h1 { font-family: var(--serif); font-size: clamp(2.6rem, 6vw, 5rem); margin: 0 0 22px; }
    h1 i { color: var(--accent); }
    .grid { display: flex; gap: 24px; flex-wrap: wrap; justify-content: center; margin: 50px 0; }
    .pill { display: flex; flex-direction: column; align-items: center; gap: 12px; }
    .bubble { width: 64px; height: 64px; border-radius: 50%; background: white; border: 1px solid var(--line); display: inline-flex; align-items: center; justify-content: center; font-size: 22px; color: var(--stone); transition: all 0.4s ease; }
    .bubble:hover { transform: translateY(-4px); border-color: var(--accent); color: var(--accent); }
    .pill span:last-child { font-size: 11px; font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase; color: var(--stone); }
    .back { font-size: 13px; color: var(--stone); display: inline-flex; align-items: center; gap: 8px; margin-top: 30px; }
    .back:hover { color: var(--accent); }
  </style>
</head>
<body>
  <nav class="navbar scrolled">
    <div class="container">
      <a href="index.html" class="navbar-brand"><span class="navbar-brand__dot"></span><span>Luna</span></a>
      <ul class="navbar-links">
        <li><a href="index.html#menu">Menu</a></li>
        <li><a href="index.html#brunch">Brunch</a></li>
        <li><a href="index.html#kontakt">Kontakt</a></li>
      </ul>
      <div class="navbar-right"><a href="index.html#kontakt" class="navbar-cta">Rezervovať stôl</a></div>
    </div>
  </nav>

  <main class="wrap">
    <div class="tag"><span class="pulse"></span> Pripravujeme niečo dobré</div>
    <h1>Café Luna spustí sociálne siete <i>čoskoro.</i></h1>
    <p style="font-size:1.05rem;color:var(--ink-soft);max-width:560px;line-height:1.8">Pripravujeme Instagram s denným menu, Facebook s eventami a TikTok s receptami z našej kuchyne. Sledujte ako prví.</p>

    <div class="grid">
      <div class="pill"><span class="bubble"><i class="fa-brands fa-instagram"></i></span><span>Instagram</span></div>
      <div class="pill"><span class="bubble"><i class="fa-brands fa-facebook-f"></i></span><span>Facebook</span></div>
      <div class="pill"><span class="bubble"><i class="fa-brands fa-tiktok"></i></span><span>TikTok</span></div>
    </div>

    <a href="index.html" class="back"><i class="fa-solid fa-arrow-left"></i> Späť na úvod</a>
  </main>
  <script src="i18n/dict.js?v=27"></script>
  <script src="js/i18n.js?v=8"></script><script src="js/main.js"></script>
</body>
</html>
